<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>古月 · 餐饮小吃门头设计AI智能体 · 全风格生成器</title>

<style>

/* 🌈 高级渐变背景 */
body{
  margin:0;
  font-family:"Microsoft YaHei";
  background: linear-gradient(135deg,#0f172a,#1e1b4b,#0f766e);
  color:#fff;
  padding:20px;
}

.container{
  max-width:1100px;
  margin:0 auto;
}

/* 标题渐变 */
h1{
  font-size:24px;
  background: linear-gradient(90deg,#60a5fa,#a78bfa,#34d399);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* 输入 */
input{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:none;
  margin-top:10px;
  outline:none;
}

/* 按钮 */
button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  background: linear-gradient(90deg,#2563eb,#7c3aed,#06b6d4);
  color:white;
  font-size:16px;
}

/* 提示 */
.tip{
  margin-top:10px;
  color:#94a3b8;
  font-size:13px;
}

/* 🌟 卡片（核心优化） */
.card{
  margin-top:12px;
  padding:14px 45px 14px 14px;
  border-radius:16px;

  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  border:1px solid rgba(255,255,255,0.1);

  position:relative;
  line-height:1.6;

  transition:0.2s;
}

.card:hover{
  transform:translateY(-2px);
}

/* 文本 */
.text{
  font-size:14px;
  color:#e5e7eb;
}

/* 🔥 小复制按钮（极简图标） */
.copy-btn{
  position:absolute;
  top:10px;
  right:10px;

  width:26px;
  height:26px;

  border-radius:6px;
  border:none;

  background: linear-gradient(135deg,#f59e0b,#ef4444);
  color:#fff;

  font-size:12px;
  cursor:pointer;

  display:flex;
  align-items:center;
  justify-content:center;

  padding:0;
}

.copy-btn:active{
  transform:scale(0.85);
}

</style>

</head>

<body>

<div class="container">

<h1>古月 · 餐饮小吃门头AI智能体</h1>

<input id="input" placeholder="输入行业，例如：奶茶店 / 小吃店 / 麻辣烫">

<button onclick="生成()">生成10组提示词</button>

<div class="tip">点击右上角按钮一键复制提示词</div>

<div id="结果"></div>

</div>

<script>

/* ===== 数据池 ===== */
const 配置 = {
  风格:["高辨识度门头","爆款餐饮门头","商业街吸客门头","强视觉冲击门头","高转化品牌门头"],
  材质:["金属烤漆","铝塑板","亚克力发光字","通体发光字","灯箱结构"],
  配色:["红黑对比","橙白高亮","黄灰撞色","红金搭配"],
  字体:["粗体发光字","立体雕刻字","视觉冲击字体"],
  构图:["居中对称","左标右字","大字压顶","横向延展"],
  卖点:["现炸现卖","网红爆款","排队王","每日现做"],
  产品:["产品灯箱","橱窗展示","食物特写"],
  细节:["灯带氛围","发光边框","LOGO强化"]
}

const 渐变库 = [
  "金属渐变光泽",
  "霓虹渐变发光边缘",
  "红金渐变层次",
  "橙白渐变高亮",
  "蓝紫渐变氛围光",
  "暖金渐变灯带",
  "流光渐变边框"
]

/* 随机 */
function 取(arr){
  return arr.splice(Math.floor(Math.random()*arr.length),1)[0]
}

/* 模板 */
function 模板(d){
  return `【门头设计】${d.需求}，${d.风格}，${d.材质}+${d.材质2}结构，${d.构图}布局，${d.配色}配色，${d.字体}字体，${d.卖点}，${d.产品}展示，${d.渐变}光影效果，${d.细节}，8K写实可施工级设计`
}

/* 🚀 生成10组（稳定不重复） */
function 生成(){

  let 需求 = document.getElementById("input").value.trim()
  if(!需求) 需求 = "餐饮门头"

  let 池 = {
    风格:[...配置.风格],
    材质:[...配置.材质],
    配色:[...配置.配色],
    字体:[...配置.字体],
    构图:[...配置.构图],
    卖点:[...配置.卖点],
    产品:[...配置.产品],
    细节:[...配置.细节],
    渐变:[...渐变库]
  }

  let used = new Set()
  let list = []

  while(list.length < 10){

    let data = {
      需求,
      风格:取(池.风格),
      材质:取(池.材质),
      材质2:取(池.材质),
      配色:取(池.配色),
      字体:取(池.字体),
      构图:取(池.构图),
      卖点:取(池.卖点),
      产品:取(池.产品),
      细节:取(池.细节),
      渐变:取(池.渐变)
    }

    let text = 模板(data)

    if(!used.has(text)){
      used.add(text)
      list.push(text)
    }
  }

  render(list)
}

/* ===== 渲染 + 复制按钮 ===== */
function render(list){

  let box = document.getElementById("结果")
  box.innerHTML = ""

  list.forEach((t,i)=>{

    let div = document.createElement("div")
    div.className = "card"

    div.innerHTML = `
      <div class="text">${i+1}. ${t}</div>
      <button class="copy-btn" onclick="copyText(\`${t.replace(/`/g,'')}\`)">⧉</button>
    `

    box.appendChild(div)
  })
}

/* 复制 */
function copyText(text){
  navigator.clipboard.writeText(text)
  alert("已复制")
}

</script>

</body>
</html>
