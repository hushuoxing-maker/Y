<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>古月 · 餐饮小吃门头AI智能体</title>

<style>

body{
  margin:0;
  font-family:"Microsoft YaHei";
  background: linear-gradient(135deg,#0f172a,#1e1b4b,#0f766e);
  color:#fff;
  padding:20px;
}

.container{max-width:1100px;margin:0 auto;}

h1{
  font-size:24px;
  background: linear-gradient(90deg,#60a5fa,#a78bfa,#34d399);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

input{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:none;
  margin-top:10px;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  background: linear-gradient(90deg,#2563eb,#7c3aed,#06b6d4);
  color:white;
}

.card{
  margin-top:12px;
  padding:14px 45px 14px 14px;
  border-radius:16px;
  background: rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.1);
  position:relative;
}

.text{
  font-size:14px;
  line-height:1.6;
}

.copy-btn{
  position:absolute;
  top:10px;
  right:10px;
  width:26px;
  height:26px;
  border:none;
  border-radius:6px;
  background: linear-gradient(135deg,#f59e0b,#ef4444);
  color:#fff;
  cursor:pointer;
}

.tip{
  margin-top:10px;
  color:#94a3b8;
  font-size:13px;
}

</style>
</head>

<body>

<div class="container">

<h1>古月 · 餐饮小吃门头AI智能体</h1>

<input id="input" placeholder="输入行业，例如：奶茶店">

<button id="btn">生成10组提示词</button>

<div class="tip">点击右上角复制按钮</div>

<div id="result"></div>

</div>

<script>

const 配置 = {
  风格:["高辨识度门头","爆款餐饮门头","商业街吸客门头","强视觉冲击门头","高转化品牌门头"],
  材质:["金属烤漆","铝塑板","亚克力发光字","通体发光字","灯箱结构"],
  配色:["红黑对比","橙白高亮","黄灰撞色","红金搭配"],
  字体:["粗体发光字","视觉冲击字体","品牌强化字体"],
  构图:["居中对称","左标右字","大字压顶"],
  卖点:["现炸现卖","网红爆款","排队王","每日现做"],
  产品:["产品灯箱","橱窗展示","食物特写"],
  细节:["灯带氛围","发光边框","LOGO强化"]
}

const 渐变库 = [
  "金属渐变光泽",
  "霓虹渐变发光边缘",
  "红金渐变层次",
  "橙白渐变高亮",
  "蓝紫渐变氛围光"
]

function 取(arr){
  return arr.splice(Math.floor(Math.random()*arr.length),1)[0]
}

function 模板(d){
  return `【门头设计】${d.需求}，${d.风格}，${d.材质}+${d.材质2}结构，${d.构图}布局，${d.配色}配色，${d.字体}字体，${d.卖点}，${d.产品}展示，${d.渐变}光影效果，${d.细节}，8K写实可施工`
}

function 生成(){

  let 需求 = document.getElementById("input").value.trim()
  if(!需求) 需求 = "餐饮门头"

  let 池 = {
    风格:[...配置.风格],
    材质:[...配置.材质],
    配色:[...配置.配色],
    字体:[...配置.字体],
    构图:[...配置.构图],
    卖点:[...配置.卖点],
    产品:[...配置.产品],
    细节:[...配置.细节],
    渐变:[...渐变库]
  }

  let used = new Set()
  let list = []

  while(list.length < 10){

    let data = {
      需求,
      风格:取(池.风格),
      材质:取(池.材质),
      材质2:取(池.材质),
      配色:取(池.配色),
      字体:取(池.字体),
      构图:取(池.构图),
      卖点:取(池.卖点),
      产品:取(池.产品),
      细节:取(池.细节),
      渐变:取(池.渐变)
    }

    let text = 模板(data)

    if(!used.has(text)){
      used.add(text)
      list.push(text)
    }
  }

  render(list)
}

function render(list){

  let box = document.getElementById("result")
  box.innerHTML = ""

  list.forEach((t,i)=>{

    let card = document.createElement("div")
    card.className = "card"

    let text = document.createElement("div")
    text.className = "text"
    text.innerText = (i+1) + ". " + t

    let btn = document.createElement("button")
    btn.className = "copy-btn"
    btn.innerText = "⧉"

    btn.addEventListener("click", ()=>{
      navigator.clipboard.writeText(t)
      btn.innerText = "✓"
      setTimeout(()=>btn.innerText="⧉",1000)
    })

    card.appendChild(text)
    card.appendChild(btn)
    box.appendChild(card)
  })
}

document.getElementById("btn").addEventListener("click", 生成)

</script>

</body>
</html>
