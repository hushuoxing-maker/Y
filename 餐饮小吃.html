<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>古月 · 餐饮小吃门头设计AI智能体 · 全风格生成器</title>

<style>
body{
  font-family:"Microsoft YaHei";
  background:#0f172a;
  color:#fff;
  padding:20px;
}

.container{
  max-width:1100px;
  margin:0 auto;
}

h1{
  font-size:26px;
  margin-bottom:20px;
}

input,button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:none;
}

button{
  background:#2563eb;
  color:#fff;
  cursor:pointer;
  font-size:16px;
}

.card{
  margin-top:15px;
  padding:15px;
  background:#1e293b;
  border-radius:12px;
  line-height:1.6;
}
</style>

</head>

<body>

<div class="container">

  <h1>古月 · 餐饮小吃门头设计AI智能体 · 全风格生成器</h1>

  <input id="input" placeholder="输入行业，例如：奶茶店 / 小吃店 / 麻辣烫">

  <button onclick="生成10组(document.getElementById('input').value)">
    生成10组不重复门头提示词
  </button>

  <div id="结果"></div>

</div>

<script>

const 配置 = {
  风格: ["高辨识度门头","爆款餐饮门头","商业街吸客门头","强视觉冲击门头","高转化品牌门头"],
  材质: ["金属烤漆","铝塑板","亚克力发光字","通体发光字","灯箱结构","立体叠层"],
  配色: ["红黑对比","橙白高亮","黄灰撞色","深绿米色","红金搭配"],
  字体: ["粗体发光字","立体雕刻字","品牌强化字体","高对比字体","视觉冲击字体"],
  构图: ["居中对称","左标右字","横向延展","大字压顶","分层结构"],
  卖点: ["现炸现卖","祖传配方","网红爆款","排队王","每日现做","手工制作"],
  产品: ["产品灯箱","大图展示","橱窗展示","食物特写","放大展示"],
  细节: ["灯带氛围","玻璃贴标","发光边框","LOGO强化","视觉引导"]
}

// 🔥 高级渐变系统
const 渐变库 = [
  "金属渐变光泽",
  "霓虹渐变发光边缘",
  "红金渐变层次",
  "橙白渐变高亮",
  "蓝紫渐变氛围光",
  "暖金渐变灯带",
  "深浅灰渐变立体感",
  "透明玻璃渐变反射",
  "霓虹流光渐变边框",
  "品牌发光渐变LOGO"
]

// 随机抽取（消耗式）
function 取(arr){
  return arr.splice(Math.floor(Math.random()*arr.length),1)[0]
}

// 🚀 模板系统（商业级）
const 模板池 = [
  d => `【爆款门头】${d.需求}，${d.风格}，${d.材质}+${d.材质2}结构，${d.构图}布局，${d.配色}主色，${d.字体}字体，${d.卖点}核心卖点，${d.产品}展示，${d.渐变}光影效果，${d.细节}强化，商业街正立面，8K写实，可施工`,

  d => `${d.需求}门头设计，${d.风格}风格，${d.构图}结构，${d.材质}材质体系，${d.配色}视觉系统，${d.字体}字体设计，主打${d.卖点}，结合${d.产品}，加入${d.渐变}渐变光效，${d.细节}`,

  d => `商业级门头：${d.需求}，${d.风格}视觉体系，${d.材质}+${d.材质2}组合，${d.构图}排版，${d.配色}色彩系统，${d.字体}字体设计，强化${d.卖点}表达，产品${d.产品}，${d.渐变}灯光渐变，${d.细节}`
]

// 生成函数（100%去重版本）
function 生成10组(需求){

  let 池 = {
    风格:[...配置.风格],
    材质:[...配置.材质],
    配色:[...配置.配色],
    字体:[...配置.字体],
    构图:[...配置.构图],
    卖点:[...配置.卖点],
    产品:[...配置.产品],
    细节:[...配置.细节],
    渐变:[...渐变库]
  }

  let used = new Set()
  let result = []

  for(let i=0;i<10;i++){

    let data = {
      需求,
      风格:取(池.风格),
      材质:取(池.材质),
      材质2:取(池.材质),
      配色:取(池.配色),
      字体:取(池.字体),
      构图:取(池.构图),
      卖点:取(池.卖点),
      产品:取(池.产品),
      细节:取(池.细节),
      渐变:取(池.渐变)
    }

    let text = (模板池[i % 模板池.length])(data)

    // 🔥 结构级去重
    if(!used.has(text)){
      used.add(text)
      result.push(text)
    }
  }

  render(result)
}

// 渲染
function render(list){
  let html = ""

  list.forEach((t,i)=>{
    html += `
      <div class="card">
        ${i+1}. ${t}
      </div>
    `
  })

  document.getElementById("结果").innerHTML = html
}

</script>

</body>
</html>
