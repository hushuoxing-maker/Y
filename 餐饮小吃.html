<script>
const 配置 = {
  风格: ["高辨识度门头","爆款餐饮门头","商业街吸客门头","强视觉冲击门头","高转化品牌门头"],
  材质: ["金属烤漆","铝塑板","亚克力发光字","通体发光字","灯箱结构","立体叠层"],
  配色: ["红黑对比","橙白高亮","黄灰撞色","深绿米色","红金搭配"],
  字体: ["粗体发光字","立体雕刻字","品牌强化字体","高对比字体","视觉冲击字体"],
  构图: ["居中对称","左标右字","横向延展","大字压顶","分层结构"],
  卖点: ["现炸现卖","祖传配方","网红爆款","排队王","每日现做","手工制作"],
  产品: ["产品灯箱","大图展示","橱窗展示","食物特写","放大展示"],
  细节: ["灯带氛围","玻璃贴标","发光边框","LOGO强化","视觉引导"]
}

// 10种完全不同结构模板（核心）
const 模板池 = [
  (d)=>`${d.风格}，${d.需求}，采用${d.材质}+${d.材质2}结构，${d.构图}，主色${d.配色}，${d.字体}，突出${d.卖点}，搭配${d.产品}，${d.细节}，正立面，白天场景`,
  
  (d)=>`${d.需求}门头设计，风格为${d.风格}，${d.构图}布局，使用${d.材质}，配色${d.配色}，品牌字体为${d.字体}，强化${d.卖点}信息，结合${d.产品}展示，细节包含${d.细节}，完整门头`,
  
  (d)=>`${d.风格}表现形式，围绕${d.需求}打造，${d.材质}+${d.材质2}材质组合，${d.配色}视觉体系，${d.构图}结构，主打${d.卖点}，加入${d.产品}，细节强化${d.细节}，商业街门头`,
  
  (d)=>`餐饮门头：${d.需求}，设计为${d.风格}，${d.构图}，采用${d.材质}结构，颜色${d.配色}，字体${d.字体}，核心卖点${d.卖点}，产品呈现${d.产品}，附加${d.细节}`,
  
  (d)=>`${d.风格}门头方案，${d.需求}，结构${d.构图}，材质${d.材质}+${d.材质2}，主色${d.配色}，字体设计${d.字体}，强调${d.卖点}，结合${d.产品}与${d.细节}`,
  
  (d)=>`${d.需求}小吃店，打造${d.风格}视觉，${d.构图}设计，${d.材质}门头，${d.配色}主调，${d.字体}呈现，主打${d.卖点}，配合${d.产品}，细节${d.细节}`,
  
  (d)=>`${d.风格}设计语言应用于${d.需求}，采用${d.材质}结构，${d.构图}布局，${d.配色}配色体系，${d.字体}字体，卖点${d.卖点}，产品${d.产品}，细节${d.细节}`,
  
  (d)=>`${d.需求}门头，设计方向${d.风格}，${d.材质}+${d.材质2}组合，${d.构图}形式，${d.配色}色彩，字体${d.字体}，强化${d.卖点}，产品${d.产品}，细节${d.细节}`,
  
  (d)=>`${d.风格}视觉门头，适用于${d.需求}，${d.构图}结构，${d.材质}制作，配色${d.配色}，字体${d.字体}，主推${d.卖点}，搭配${d.产品}，细节${d.细节}`,
  
  (d)=>`${d.需求}商业门头设计，采用${d.风格}，${d.材质}+${d.材质2}，${d.构图}布局，${d.配色}配色，${d.字体}字体，突出${d.卖点}，结合${d.产品}，细节${d.细节}`
]

// 随机且“消耗式抽取”
function 取(arr){
  return arr.splice(Math.floor(Math.random()*arr.length),1)[0]
}

function 生成10组(需求){
  let result = []

  // 每次复制一份池子（防止重复）
  let 池 = JSON.parse(JSON.stringify(配置))

  for(let i=0;i<10;i++){
    let data = {
      需求,
      风格: 取(池.风格),
      材质: 取(池.材质),
      材质2: 取(池.材质),
      配色: 取(池.配色),
      字体: 取(池.字体),
      构图: 取(池.构图),
      卖点: 取(池.卖点),
      产品: 取(池.产品),
      细节: 取(池.细节)
    }

    result.push(模板池[i](data))
  }

  return result
}
</script>
