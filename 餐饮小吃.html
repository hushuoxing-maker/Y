<script>

const 配置 = {
  风格:["高辨识度门头","爆款餐饮门头","商业街吸客门头","强视觉冲击门头","高转化品牌门头"],
  材质:["金属烤漆","铝塑板","亚克力发光字","通体发光字","灯箱结构"],
  配色:["红黑对比","橙白高亮","黄灰撞色","红金搭配"],
  字体:["粗体发光字","视觉冲击字体","品牌强化字体"],
  构图:["居中对称","左标右字","大字压顶"],
  卖点:["现炸现卖","网红爆款","排队王","每日现做"],
  产品:["产品灯箱","橱窗展示","食物特写"],
  细节:["灯带氛围","发光边框","LOGO强化"]
}

const 渐变库 = [
  "金属渐变光泽",
  "霓虹渐变发光边缘",
  "红金渐变层次",
  "橙白渐变高亮",
  "蓝紫渐变氛围光"
]

function 取(arr){
  return arr.splice(Math.floor(Math.random()*arr.length),1)[0]
}

function 模板(d){
  return `【门头设计】${d.需求}，${d.风格}，${d.材质}+${d.材质2}结构，${d.构图}布局，${d.配色}配色，${d.字体}字体，${d.卖点}，${d.产品}展示，${d.渐变}光影效果，${d.细节}，8K写实可施工`
}

/* =========================
   🚀 核心修复：DOM安全启动
========================= */
function init(){

  const btn = document.getElementById("btn")
  const input = document.getElementById("input")

  if(!btn || !input){
    console.error("DOM未加载完成")
    return
  }

  btn.addEventListener("click", ()=>{

    let 需求 = input.value.trim()

    // 防空
    if(!需求){
      需求 = "餐饮门头"
    }

    生成(需求)
  })
}

/* =========================
   🚀 生成函数（稳定10条）
========================= */
function 生成(需求){

  let 池 = {
    风格:[...配置.风格],
    材质:[...配置.材质],
    配色:[...配置.配色],
    字体:[...配置.字体],
    构图:[...配置.构图],
    卖点:[...配置.卖点],
    产品:[...配置.产品],
    细节:[...配置.细节],
    渐变:[...渐变库]
  }

  let used = new Set()
  let list = []

  while(list.length < 10){

    let data = {
      需求,
      风格:取(池.风格),
      材质:取(池.材质),
      材质2:取(池.材质),
      配色:取(池.配色),
      字体:取(池.字体),
      构图:取(池.构图),
      卖点:取(池.卖点),
      产品:取(池.产品),
      细节:取(池.细节),
      渐变:取(池.渐变)
    }

    let text = 模板(data)

    if(!used.has(text)){
      used.add(text)
      list.push(text)
    }
  }

  render(list)
}

/* =========================
   🚀 渲染
========================= */
function render(list){

  const box = document.getElementById("result")
  box.innerHTML = ""

  list.forEach((t,i)=>{

    const div = document.createElement("div")
    div.className = "card"

    const text = document.createElement("div")
    text.className = "text"
    text.innerText = `${i+1}. ${t}`

    const btn = document.createElement("button")
    btn.className = "copy-btn"
    btn.innerText = "⧉"

    btn.addEventListener("click", ()=>{
      navigator.clipboard.writeText(t)
      btn.innerText = "✓"
      setTimeout(()=>btn.innerText="⧉",800)
    })

    div.appendChild(text)
    div.appendChild(btn)
    box.appendChild(div)
  })
}

/* =========================
   🚀 启动入口（关键修复）
========================= */
window.addEventListener("DOMContentLoaded", init)

</script>
