<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>古月 · 餐饮小吃门头AI智能体 | 专业版</title>
<style>

/* 全局重置 & 现代风格 */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: radial-gradient(circle at 10% 20%, #0a0f1e 0%, #0f172a 50%, #0a2e2a 100%);
  font-family: 'Inter', system-ui, 'Segoe UI', 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, sans-serif;
  padding: 24px 20px 60px;
  min-height: 100vh;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
}

/* 头部艺术装饰 */
.hero {
  margin-bottom: 32px;
  position: relative;
}

.badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(8px);
  border-radius: 60px;
  padding: 6px 16px;
  font-size: 0.75rem;
  letter-spacing: 0.5px;
  color: #facc15;
  border: 0.5px solid rgba(255,255,255,0.15);
  margin-bottom: 16px;
  font-weight: 500;
}

h1 {
  font-size: 2.6rem;
  font-weight: 800;
  background: linear-gradient(135deg, #fef08a, #f97316, #ec4899, #06b6d4);
  background-clip: text;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: -0.5px;
  margin-bottom: 12px;
  line-height: 1.2;
}

.sub {
  color: #94a3b8;
  font-size: 0.9rem;
  border-left: 3px solid #f97316;
  padding-left: 14px;
  margin-top: 6px;
  font-weight: 400;
}

/* 统计栏 */
.stats-bar {
  display: flex;
  gap: 20px;
  margin-top: 20px;
  flex-wrap: wrap;
}

.stat-item {
  background: rgba(255,255,255,0.05);
  border-radius: 40px;
  padding: 6px 16px;
  font-size: 0.75rem;
  color: #cbd5e1;
  display: flex;
  align-items: center;
  gap: 6px;
}

.stat-number {
  color: #facc15;
  font-weight: 700;
  font-size: 0.9rem;
}

/* 输入卡片 */
.input-card {
  background: rgba(15, 25, 45, 0.7);
  backdrop-filter: blur(16px);
  border-radius: 32px;
  padding: 24px;
  margin-bottom: 28px;
  border: 1px solid rgba(255,255,255,0.12);
  box-shadow: 0 20px 35px -12px rgba(0,0,0,0.4);
}

.input-row {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}

.input-field {
  flex: 1;
  padding: 16px 20px;
  font-size: 1rem;
  background: rgba(0,0,0,0.5);
  border: 1.5px solid rgba(255,255,255,0.2);
  border-radius: 28px;
  color: #fff;
  outline: none;
  transition: 0.2s;
  font-weight: 500;
}

.input-field:focus {
  border-color: #f97316;
  box-shadow: 0 0 0 3px rgba(249,115,22,0.3);
}

.btn-generate {
  background: linear-gradient(95deg, #f97316, #dc2626, #f59e0b);
  background-size: 200% auto;
  border: none;
  padding: 0 28px;
  border-radius: 44px;
  font-weight: 700;
  font-size: 1rem;
  color: white;
  cursor: pointer;
  transition: 0.25s;
  letter-spacing: 1px;
  display: flex;
  align-items: center;
  gap: 8px;
  white-space: nowrap;
}

.btn-generate:hover:not(:disabled) {
  transform: scale(1.02);
  background-position: right center;
  box-shadow: 0 8px 20px rgba(249,115,22,0.4);
}

.btn-generate:disabled {
  opacity: 0.6;
  cursor: not-allowed;
  transform: none;
}

/* 工具栏 */
.toolbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin: 16px 0 20px;
  flex-wrap: wrap;
  gap: 12px;
}

.tip-banner {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 0.75rem;
  color: #a5b4fc;
  background: rgba(0,0,0,0.3);
  padding: 6px 16px;
  border-radius: 40px;
}

.tool-buttons {
  display: flex;
  gap: 10px;
}

.icon-btn {
  background: rgba(255,255,255,0.08);
  border: none;
  padding: 8px 16px;
  border-radius: 32px;
  font-size: 0.75rem;
  color: #cbd5e1;
  cursor: pointer;
  transition: 0.2s;
  display: flex;
  align-items: center;
  gap: 6px;
}

.icon-btn:hover {
  background: rgba(249,115,22,0.3);
  color: #facc15;
}

/* 结果网格 */
.results-grid {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* 卡片样式 */
.prompt-card {
  background: rgba(10, 20, 35, 0.75);
  backdrop-filter: blur(12px);
  border-radius: 20px;
  padding: 16px 18px;
  border: 1px solid rgba(255,255,255,0.1);
  transition: all 0.2s ease;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

.prompt-card:hover {
  background: rgba(20, 35, 55, 0.85);
  border-color: rgba(249,115,22,0.4);
}

.prompt-left {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  flex: 1;
}

.prompt-num {
  background: rgba(249,115,22,0.2);
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 12px;
  font-weight: 700;
  font-size: 0.85rem;
  color: #fdba74;
  flex-shrink: 0;
}

.prompt-text {
  flex: 1;
  font-size: 0.9rem;
  line-height: 1.5;
  color: #e2e8f0;
  word-break: break-word;
}

.card-actions {
  display: flex;
  gap: 8px;
  flex-shrink: 0;
}

.copy-btn, .fav-btn {
  background: rgba(255,255,255,0.06);
  border: none;
  padding: 8px 14px;
  border-radius: 30px;
  font-size: 0.7rem;
  font-weight: 500;
  cursor: pointer;
  transition: 0.2s;
  color: #94a3b8;
}

.copy-btn:hover {
  background: #f97316;
  color: white;
}

.fav-btn:hover {
  background: #facc15;
  color: #1e1b4b;
}

.fav-btn.active {
  background: #facc15;
  color: #1e1b4b;
}

/* 加载动画 */
.loading-overlay {
  text-align: center;
  padding: 40px;
}

.spinner {
  width: 40px;
  height: 40px;
  border: 3px solid rgba(249,115,22,0.3);
  border-top-color: #f97316;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 12px;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.empty-state {
  text-align: center;
  padding: 50px 24px;
  background: rgba(0,0,0,0.25);
  border-radius: 32px;
  color: #64748b;
}

.toast-msg {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  background: #1e293b;
  backdrop-filter: blur(20px);
  padding: 10px 24px;
  border-radius: 60px;
  color: #facc15;
  font-weight: 600;
  font-size: 0.85rem;
  z-index: 1000;
  box-shadow: 0 10px 25px -5px black;
  border-left: 3px solid #f97316;
  pointer-events: none;
  white-space: nowrap;
}

@media (max-width: 680px) {
  .input-row {
    flex-direction: column;
  }
  .btn-generate {
    justify-content: center;
    padding: 14px;
  }
  .prompt-card {
    flex-wrap: wrap;
  }
  .card-actions {
    margin-left: auto;
  }
  .toast-msg {
    white-space: normal;
    font-size: 0.75rem;
    max-width: 85%;
    text-align: center;
  }
}
</style>
</head>
<body>
<div class="container">
  <div class="hero">
    <div class="badge">
      <span>⚡</span> AI 智能体 · 专业门头设计引擎
    </div>
    <h1>古月 · 餐饮小吃门头AI智能体</h1>
    <div class="sub">「高辨识度 · 爆款转化 · 施工级设计」智能生成专业门头提示词</div>
    <div class="stats-bar">
      <div class="stat-item">🎨 <span class="stat-number" id="styleCount">12+</span> 风格库</div>
      <div class="stat-item">🧱 <span class="stat-number" id="materialCount">12+</span> 材质库</div>
      <div class="stat-item">🎨 <span class="stat-number" id="colorCount">12+</span> 配色方案</div>
      <div class="stat-item">✨ <span class="stat-number" id="gradientCount">10+</span> 光效渐变</div>
    </div>
  </div>

  <div class="input-card">
    <div class="input-row">
      <input type="text" id="industryInput" class="input-field" placeholder="输入品类，例：螺蛳粉店 / 炸鸡工坊 / 糖水铺 / 烤肉食堂" value="新派螺蛳粉小吃">
      <button id="generateBtn" class="btn-generate">
        <span>✨</span> 生成10组提示词
      </button>
    </div>
  </div>

  <div class="toolbar">
    <div class="tip-banner">
      💡 专业提示词 | 可施工级 | 支持一键复制 & 收藏
    </div>
    <div class="tool-buttons">
      <button id="copyAllBtn" class="icon-btn">📋 一键复制全部</button>
      <button id="showFavBtn" class="icon-btn">⭐ 收藏夹 (<span id="favCount">0</span>)</button>
      <button id="refreshBtn" class="icon-btn">🔄 刷新</button>
    </div>
  </div>

  <div id="resultsContainer" class="results-grid">
    <div class="empty-state">
      🌟 点击上方按钮，AI为你定制10组震撼门头设计提示词
    </div>
  </div>
</div>

<script>
  // ==================== 专业配置库 (增强版) ====================
  const STYLE_POOL = [
    "赛博朋克霓虹风", "国潮复古鎏金门头", "极简主义高冷风", "多巴胺色彩网红风",
    "工业废墟硬核风", "日式侘寂美学", "美式复古 diner 风", "未来科技发光体",
    "新中式园林意境", "南洋风情骑楼风", "韩系奶油简约风", "暗黑高奢金属风"
  ];

  const MATERIAL_POOL = [
    "金属烤漆", "铝塑板高光", "亚克力发光字", "通体发光字", "拉丝不锈钢", 
    "镜面镀钛板", "磨砂玻璃+灯带", "仿古铜板", "立体冲孔铝板", "3D打印树脂字",
    "软膜天花灯箱", "烤漆玻璃", "耐候钢板", "夯土质感涂料", "波浪金属板"
  ];

  const COLOR_POOL = [
    "红黑撞色", "橙白高亮活力", "黄灰轻奢", "红金尊贵", "克莱因蓝+亮橙",
    "莫兰迪绿+暖白", "黑白极简", "复古红砖+米黄", "深空灰+霓虹紫", "樱花粉+珍珠白",
    "落日橙+深棕", "荧光绿+炭黑", "蒂芙尼蓝+玫瑰金", "爱马仕橙+枪灰色"
  ];

  const FONT_POOL = [
    "粗体超粗发光字", "立体厚重大字", "视觉冲击倾斜字体", "手写书法发光字",
    "极简无衬线凸起字", "复古霓虹灯管字", "3D水晶立体字", "金属包边雕刻字",
    "圆润气泡字体", "哥特式尖角字体"
  ];

  const COMPOSITION_POOL = [
    "居中对称磅礴布局", "左标右字动态留白", "大字压顶阵列结构", "双层错位视觉引导",
    "悬浮立体架构", "U型环绕灯箱布局", "顶部巨型符号+底部小字", "不对称先锋构图",
    "三段式黄金分割", "L型转角延伸设计"
  ];

  const SELLING_POINT_POOL = [
    "现炸现卖烟火气", "网红爆款必打卡", "排队王口碑认证", "每日现做新鲜承诺",
    "传承三代老味道", "首创独家秘方", "大众点评年度推荐", "明星同款打卡圣地",
    "24h深夜食堂", "0添加健康标识", "米其林星厨监制", "必吃榜上榜品牌"
  ];

  const PRODUCT_SHOW_POOL = [
    "产品灯箱巨幅展示", "橱窗实拍美食陈列", "食物特写高清画面", "动态视频海报嵌入",
    "明档窗口诱人呈现", "发光美食插图", "爆品3D模型陈列", "菜谱立牌发光画册",
    "旋转展示台+射灯", "巨型食物模型装置"
  ];

  const DETAIL_POOL = [
    "环绕式LED灯带氛围", "发光边框勾勒轮廓", "LOGO背光强化", "侧面洗墙灯照射",
    "立体雨棚灯效", "地面投影迎宾光毯", "发光门把手细节", "顶部流动光带", 
    "镂空光影层次", "动态呼吸灯效", "感应式迎宾灯光"
  ];

  const GRADIENT_POOL = [
    "液态金属渐变光泽", "霓虹紫橙渐变发光边缘", "红金复古奢华渐变", "橙白高光渐变",
    "赛博蓝紫渐变氛围光", "暖金落日渐变灯带", "流光溢彩幻彩边框", "极光绿到青渐变",
    "夕阳熔岩渐变纹理", "珍珠白至香槟金过渡", "冰蓝到深紫极光", "玫瑰金渐变"
  ];

  // 统计数据
  document.getElementById('styleCount').innerText = STYLE_POOL.length;
  document.getElementById('materialCount').innerText = MATERIAL_POOL.length;
  document.getElementById('colorCount').innerText = COLOR_POOL.length;
  document.getElementById('gradientCount').innerText = GRADIENT_POOL.length;

  // 辅助函数
  function randomItem(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
  }

  function getDistinctItem(arr, exclude) {
    const filtered = arr.filter(i => i !== exclude);
    return filtered.length ? randomItem(filtered) : randomItem(arr);
  }

  // 生成单条提示词
  function generatePrompt(industry, existingSet = null) {
    const style = randomItem(STYLE_POOL);
    const material1 = randomItem(MATERIAL_POOL);
    const material2 = getDistinctItem(MATERIAL_POOL, material1);
    const color = randomItem(COLOR_POOL);
    const font = randomItem(FONT_POOL);
    const composition = randomItem(COMPOSITION_POOL);
    const selling = randomItem(SELLING_POINT_POOL);
    const productShow = randomItem(PRODUCT_SHOW_POOL);
    const detail = randomItem(DETAIL_POOL);
    const gradient = randomItem(GRADIENT_POOL);

    const targetIndustry = industry || "特色小吃";
    
    const prompt = `【门头AI设计】${targetIndustry} · ${style}门头 · 主材${material1}+${material2}复合结构 · ${composition}构图 · ${color}配色 · ${font}字体 · 卖点「${selling}」 · ${productShow}展示 · ${gradient}光效 · ${detail}细节 · 8K可施工级渲染`;

    return prompt;
  }

  // 生成10组差异化的提示词
  function generateBatch(industry, count = 10) {
    const prompts = [];
    const usedSet = new Set();
    let attempts = 0;
    const maxAttempts = 50;

    while (prompts.length < count && attempts < maxAttempts) {
      const newPrompt = generatePrompt(industry);
      if (!usedSet.has(newPrompt)) {
        usedSet.add(newPrompt);
        prompts.push(newPrompt);
      }
      attempts++;
    }

    // 补齐不足
    while (prompts.length < count) {
      prompts.push(generatePrompt(industry) + " · 独家创意变体");
    }
    return prompts;
  }

  // Toast 提示
  let toastTimer = null;
  function showToast(message, duration = 1800) {
    const existing = document.querySelector('.toast-msg');
    if (existing) existing.remove();
    const toast = document.createElement('div');
    toast.className = 'toast-msg';
    toast.innerText = message;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), duration);
  }

  // 复制到剪贴板
  async function copyToClipboard(text, successMsg = '✅ 已复制') {
    try {
      await navigator.clipboard.writeText(text);
      showToast(successMsg);
      return true;
    } catch {
      const textarea = document.createElement('textarea');
      textarea.value = text;
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand('copy');
      document.body.removeChild(textarea);
      showToast(successMsg);
      return true;
    }
  }

  // 收藏夹管理
  let favorites = [];
  let currentPrompts = [];

  function loadFavorites() {
    const saved = localStorage.getItem('guYue_favorites');
    if (saved) {
      try {
        favorites = JSON.parse(saved);
      } catch(e) { favorites = []; }
    }
    updateFavCount();
  }

  function saveFavorites() {
    localStorage.setItem('guYue_favorites', JSON.stringify(favorites));
    updateFavCount();
  }

  function updateFavCount() {
    document.getElementById('favCount').innerText = favorites.length;
  }

  function toggleFavorite(prompt, btnElement) {
    const index = favorites.indexOf(prompt);
    if (index === -1) {
      favorites.push(prompt);
      showToast('⭐ 已添加到收藏夹', 1000);
      if (btnElement) btnElement.classList.add('active');
    } else {
      favorites.splice(index, 1);
      showToast('🗑 已移除收藏', 1000);
      if (btnElement) btnElement.classList.remove('active');
    }
    saveFavorites();
  }

  function isFavorite(prompt) {
    return favorites.includes(prompt);
  }

  // 渲染列表
  function renderPrompts(prompts) {
    const container = document.getElementById('resultsContainer');
    if (!prompts.length) {
      container.innerHTML = '<div class="empty-state">🤖 暂无数据，请点击生成按钮</div>';
      return;
    }

    container.innerHTML = '';
    prompts.forEach((prompt, idx) => {
      const card = document.createElement('div');
      card.className = 'prompt-card';
      
      const isFav = isFavorite(prompt);
      
      card.innerHTML = `
        <div class="prompt-left">
          <div class="prompt-num">${idx + 1}</div>
          <div class="prompt-text">${escapeHtml(prompt)}</div>
        </div>
        <div class="card-actions">
          <button class="copy-btn" data-prompt="${escapeHtml(prompt)}">📋 复制</button>
          <button class="fav-btn ${isFav ? 'active' : ''}" data-prompt="${escapeHtml(prompt)}">${isFav ? '⭐ 已收藏' : '☆ 收藏'}</button>
        </div>
      `;
      
      container.appendChild(card);
    });

    // 绑定事件
    document.querySelectorAll('.copy-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const promptText = btn.getAttribute('data-prompt');
        copyToClipboard(promptText, '📋 提示词已复制');
      });
    });

    document.querySelectorAll('.fav-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const promptText = btn.getAttribute('data-prompt');
        toggleFavorite(promptText, btn);
        // 更新按钮文字样式
        const isNowFav = isFavorite(promptText);
        btn.innerHTML = isNowFav ? '⭐ 已收藏' : '☆ 收藏';
        if (isNowFav) btn.classList.add('active');
        else btn.classList.remove('active');
      });
    });
  }

  function escapeHtml(str) {
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  // 加载状态
  let isLoading = false;
  async function generateAndRender() {
    if (isLoading) return;
    isLoading = true;
    const btn = document.getElementById('generateBtn');
    const originalText = btn.innerHTML;
    btn.innerHTML = '<span>⏳</span> 生成中...';
    btn.disabled = true;

    const input = document.getElementById('industryInput');
    let industry = input.value.trim();
    if (!industry) industry = '特色小吃';

    // 模拟微小延迟让动画可见
    await new Promise(r => setTimeout(r, 100));
    
    const newPrompts = generateBatch(industry, 10);
    currentPrompts = newPrompts;
    renderPrompts(newPrompts);
    
    btn.innerHTML = originalText;
    btn.disabled = false;
    isLoading = false;
    showToast(`✨ 已为「${industry}」生成10组专业提示词`, 1500);
  }

  // 一键复制全部
  function copyAll() {
    if (!currentPrompts.length) {
      showToast('⚠️ 暂无提示词可复制', 1000);
      return;
    }
    const allText = currentPrompts.map((p, i) => `${i+1}. ${p}`).join('\n\n');
    copyToClipboard(allText, '📋 已复制全部10组提示词');
  }

  // 显示收藏夹
  function showFavorites() {
    if (favorites.length === 0) {
      showToast('⭐ 收藏夹为空，点击卡片上的☆按钮收藏喜欢的提示词', 2000);
      return;
    }
    renderPrompts(favorites);
    showToast(`⭐ 显示收藏夹 (${favorites.length}条)`, 1200);
  }

  // 刷新/重新生成当前行业
  function refresh() {
    generateAndRender();
  }

  // 初始化事件
  function init() {
    loadFavorites();
    
    document.getElementById('generateBtn').addEventListener('click', generateAndRender);
    document.getElementById('copyAllBtn').addEventListener('click', copyAll);
    document.getElementById('showFavBtn').addEventListener('click', showFavorites);
    document.getElementById('refreshBtn').addEventListener('click', refresh);
    
    // 回车触发生成
    document.getElementById('industryInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') generateAndRender();
    });
    
    // 默认生成一组示例
    setTimeout(() => {
      generateAndRender();
    }, 200);
  }

  init();
</script>
</body>
</html>
