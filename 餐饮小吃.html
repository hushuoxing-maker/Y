<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>古月 · 餐饮小吃门头设计AI智能体 · 全风格生成器</title>

<style>
body{
  font-family:"Microsoft YaHei";
  background:#0f172a;
  color:#fff;
  padding:20px;
}

.container{
  max-width:1100px;
  margin:0 auto;
}

h1{
  font-size:24px;
  margin-bottom:15px;
}

input,button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:none;
}

button{
  background:#2563eb;
  color:#fff;
  cursor:pointer;
}

.card{
  margin-top:10px;
  padding:12px;
  background:#1e293b;
  border-radius:10px;
  line-height:1.6;
}

.tip{
  margin-top:10px;
  color:#94a3b8;
  font-size:14px;
}
</style>
</head>

<body>

<div class="container">

  <h1>古月 · 餐饮小吃门头AI生成器</h1>

  <input id="input" placeholder="请输入行业，例如：奶茶店 / 小吃店 / 麻辣烫">

  <button onclick="生成()">生成10组提示词</button>

  <div class="tip">提示：输入行业后点击生成（默认会自动防止空白报错）</div>

  <div id="结果"></div>

</div>

<script>

const 配置 = {
  风格:["高辨识度门头","爆款餐饮门头","商业街吸客门头","强视觉冲击门头","高转化品牌门头"],
  材质:["金属烤漆","铝塑板","亚克力发光字","通体发光字","灯箱结构"],
  配色:["红黑对比","橙白高亮","黄灰撞色","红金搭配"],
  字体:["粗体发光字","立体雕刻字","品牌强化字体","视觉冲击字体"],
  构图:["居中对称","左标右字","横向延展","大字压顶"],
  卖点:["现炸现卖","祖传配方","网红爆款","排队王","每日现做"],
  产品:["产品灯箱","橱窗展示","食物特写"],
  细节:["灯带氛围","发光边框","LOGO强化","视觉引导"]
}

const 渐变库 = [
  "金属渐变光泽",
  "霓虹渐变发光边缘",
  "红金渐变层次",
  "橙白渐变高亮",
  "蓝紫渐变氛围光"
]

// 安全随机
function 取(arr){
  if(!arr || arr.length === 0) return "基础设计"
  return arr.splice(Math.floor(Math.random()*arr.length),1)[0]
}

// 模板（安全版）
function 模板(d){
  return `【商业门头】${d.需求}，${d.风格}，${d.材质}+${d.材质2}结构，${d.构图}布局，${d.配色}配色，${d.字体}字体，${d.卖点}，${d.产品}展示，${d.渐变}光影效果，${d.细节}，8K写实可施工`
}

// 主函数（防崩版）
function 生成(){

  let 需求 = document.getElementById("input").value.trim()

  // 🚨 防空
  if(!需求){
    需求 = "餐饮门头"
  }

  let 池 = {
    风格:[...配置.风格],
    材质:[...配置.材质],
    配色:[...配置.配色],
    字体:[...配置.字体],
    构图:[...配置.构图],
    卖点:[...配置.卖点],
    产品:[...配置.产品],
    细节:[...配置.细节],
    渐变:[...渐变库]
  }

  let used = new Set()
  let result = []

  for(let i=0;i<10;i++){

    let data = {
      需求,
      风格:取(池.风格),
      材质:取(池.材质),
      材质2:取(池.材质),
      配色:取(池.配色),
      字体:取(池.字体),
      构图:取(池.构图),
      卖点:取(池.卖点),
      产品:取(池.产品),
      细节:取(池.细节),
      渐变:取(池.渐变)
    }

    let text = 模板(data)

    if(!used.has(text)){
      used.add(text)
      result.push(text)
    }
  }

  render(result)
}

// 渲染（防空）
function render(list){

  let box = document.getElementById("结果")

  if(!list || list.length === 0){
    box.innerHTML = `<div class="card">暂无生成内容</div>`
    return
  }

  let html = ""

  list.forEach((t,i)=>{
    html += `<div class="card">${i+1}. ${t}</div>`
  })

  box.innerHTML = html
}

// 初始化（关键：防白屏）
window.onload = function(){
  render(["请输入行业点击生成，即可生成门头设计提示词"])
}

</script>

</body>
</html>
